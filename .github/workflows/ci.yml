name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff

      - name: Lint with ruff
        run: ruff check src tests

      - name: Run test suite with coverage
        run: pytest --cov=churn_prediction --cov-report=term-missing

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t aegis-churn-api .

      - name: Boot container and verify /health
        run: |
          docker run -d --name aegis -p 8000:8000 aegis-churn-api
          for i in $(seq 1 30); do
            if curl --silent --fail http://localhost:8000/health; then
              echo "API healthy"
              exit 0
            fi
            sleep 2
          done
          echo "API failed to become healthy" >&2
          docker logs aegis >&2
          exit 1
